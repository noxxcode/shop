<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaShop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Inter;
  background: #0b0f1a;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: #11182a;
  position: sticky;
  top: 0;
}

.logo {
  font-size: 22px;
  font-weight: 700;
}

input {
  width: 40%;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* HERO */
.hero {
  text-align: center;
  padding: 30px;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #151d33;
  padding: 15px;
  border-radius: 15px;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
}

img {
  width: 100%;
  border-radius: 10px;
}

.price {
  color: #4cff9a;
  font-weight: bold;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #5b7cff;
  color: white;
  cursor: pointer;
}

/* CART */
.cart {
  position: fixed;
  right: 15px;
  bottom: 15px;
  background: #11182a;
  padding: 15px;
  width: 260px;
  border-radius: 15px;
}

.cart h3 {
  margin-top: 0;
}

.small {
  font-size: 12px;
  color: gray;
}

.order {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.order input {
  width: 100%;
  background: #0b0f1a;
  color: white;
}
</style>
</head>

<body>

<header>
  <div class="logo">🔥 NovaShop</div>
  <input type="text" placeholder="Поиск..." oninput="search(this.value)">
  <div>Корзина: <span id="count">0</span></div>
</header>

<div class="hero">
  <h1>Лучшие товары</h1>
  <p>Доставка • Оплата при получении</p>
</div>

<div class="products" id="products"></div>

<div class="cart">
  <h3>Корзина</h3>
  <div id="cartItems"></div>
  <p><b>Итого: <span id="total">0</span> ₴</b></p>

  <div class="order">
    <input id="name" placeholder="Имя">
    <input id="phone" placeholder="Телефон">
    <button onclick="order()">Оформить заказ</button>
  </div>

  <p class="small">Мы свяжемся с вами</p>
</div>

<script>
const products = [
  {name:"Наушники", price:1200, img:"https://via.placeholder.com/300", cat:"tech"},
  {name:"Часы", price:1800, img:"https://via.placeholder.com/300", cat:"tech"},
  {name:"Лампа", price:800, img:"https://via.placeholder.com/300", cat:"home"},
];

let cart = [];

function render(list=products){
  document.getElementById("products").innerHTML =
  list.map((p,i)=>`
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <div class="price">${p.price} ₴</div>
      <button onclick="add(${i})">В корзину</button>
    </div>
  `).join("");
}

function add(i){
  cart.push(products[i]);
  update();
}

function update(){
  document.getElementById("count").innerText = cart.length;

  document.getElementById("cartItems").innerHTML =
    cart.map(i=>`<div>${i.name} - ${i.price} ₴</div>`).join("");

  document.getElementById("total").innerText =
    cart.reduce((s,i)=>s+i.price,0);
}

function search(v){
  render(products.filter(p=>p.name.toLowerCase().includes(v.toLowerCase())));
}

function order(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  if(!name || !phone){
    alert("Заполни данные");
    return;
  }

  let text = "Новый заказ:\n";
  cart.forEach(i=>{
    text += i.name + " - " + i.price + "₴\n";
  });

  text += "\nИмя: " + name + "\nТел: " + phone;

  alert(text);
}

render();
update();
</script>

</body>
</html>

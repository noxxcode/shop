<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>My Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f0f1a;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      background: #15152a;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 15px;
    }

    .card {
      background: #1b1b2e;
      width: 220px;
      border-radius: 12px;
      padding: 15px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: #4cff9a;
      font-weight: bold;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #5b7cff;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #3f63ff;
    }
  </style>
</head>

<body>

<header>🔥 My Dropshipping Shop</header>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/220" />
    <h3>Наушники</h3>
    <div class="price">1200 ₴</div>
    <button>Заказать</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/220" />
    <h3>Смарт-часы</h3>
    <div class="price">1800 ₴</div>
    <button>Заказать</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/220" />
    <h3>Колонка</h3>
    <div class="price">999 ₴</div>
    <button>Заказать</button>
  </div>

</div>

</body>
</html>
